name: Weekly Ingestion

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PARALLEL_API_KEY: ${{ secrets.PARALLEL_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run ingestion
        run: pnpm ingest:refresh

      - name: Write successful-run heartbeat
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const heartbeatPath = ".github/heartbeat/weekly-ingestion.json";

          fs.mkdirSync(".github/heartbeat", { recursive: true });
          fs.writeFileSync(
            heartbeatPath,
            `${JSON.stringify(
              {
                workflow: process.env.GITHUB_WORKFLOW,
                last_success_at: new Date().toISOString(),
                run_id: process.env.GITHUB_RUN_ID,
                run_number: process.env.GITHUB_RUN_NUMBER,
                ref_name: process.env.GITHUB_REF_NAME,
                sha: process.env.GITHUB_SHA,
              },
              null,
              2,
            )}\n`,
          );
          NODE

      - name: Commit heartbeat
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/heartbeat/weekly-ingestion.json

          if git diff --cached --quiet; then
            echo "Heartbeat unchanged; skipping commit."
            exit 0
          fi

          git commit -m "chore: update ingestion heartbeat [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
